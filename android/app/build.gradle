plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.aksab.logistics"
    // رفع لـ 36 إجباري عشان خاطر androidx.core 1.17.0
    compileSdk = 36

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId = "com.aksab.logistics"
        minSdk = 24 // رفعنا المينيمم لـ 24 لضمان توافق أفضل مع 36
        targetSdk = 36
        versionCode = 1
        versionName = "1.0.0"
        multiDexEnabled true
    }

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_11 // رفع لـ Java 11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = '11'
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source = "../.."
}

dependencies {
    // الإصدار ده هو الوحيد اللي هيحل مشكلة الـ Metadata مع SDK 36
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.4'
    implementation "androidx.multidex:multidex:2.0.1"
}
