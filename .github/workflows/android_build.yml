name: Build Flutter Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          
      - run: flutter pub get

      # بناء الـ APK باستخدام Gradle مباشرة لضمان الإنتاج
      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      # خطوة "كاشف المسار" عشان نشوف الملف راح فين بالظبط
      - name: Locate APK
        run: find . -name "*.apk"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aksab-debug-apk
          # هنرفع أي ملف APK يتم إنتاجه أياً كان مكانه
          path: "**/*.apk"
          if-no-files-found: error
