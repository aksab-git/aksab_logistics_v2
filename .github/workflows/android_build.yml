name: Flutter Build (Fast Track)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      # تم إلغاء خطوة الـ Analyze تماماً للاعتماد على لوجات الـ APK
      
      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Find and Collect APK
        run: |
          mkdir -p output
          find build/app/outputs/flutter-apk/ -name "*release.apk" -exec cp {} ./output/aksab_erp_final.apk \;
          ls -R output || echo "APK not found, checking directory structure..."

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aksab-ERP-Final-Test
          path: output/*.apk
