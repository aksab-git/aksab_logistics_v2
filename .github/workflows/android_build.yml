name: Flutter Build (APK Only - Temp Signed)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      # بناء APK Release بتوقيع مؤقت (debug)
      - name: Build Release APK (Temp Signed)
        run: flutter build apk --release

      # رفع الـ APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aksab-Captain-APK
          path: build/app/outputs/flutter-apk/app-release.apk
