name: Flutter Build (Release APK - No Debug)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      # بناء نسخة الـ Release
      # ملحوظة: شلنا || true عشان لو فيه خطأ برمي يظهر فوراً في الـ Actions
      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons

      # خطوة تجميع النسخة النهائية في مجلد مستقل
      - name: Find and Collect APK
        run: |
          mkdir -p output
          find build/app/outputs/flutter-apk/ -name "*release.apk" -exec cp {} ./output/aksab_logistics_v2_release.apk \;
          ls -R output

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aksab-Logistics-Release-v2
          path: output/*.apk
          if-no-files-found: error
