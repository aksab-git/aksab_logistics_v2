name: Build Flutter Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          
      - run: flutter pub get
      
      # بناء نسخة Debug
      - name: Build APK
        run: flutter build apk --debug
      
      # خطوة إضافية للتأكد من مكان الملف (هتظهرلك في اللوجات لو فشل)
      - name: List APK files
        run: find . -name "*.apk"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aksab-debug-apk
          # التعديل هنا: استخدام النمط النجمي ليجد الملف في أي مسار مخرجات
          path: "**/build/app/outputs/flutter-apk/app-debug.apk"
          # أو كحل بديل أكثر مرونة:
          # path: "**/*.apk" 
