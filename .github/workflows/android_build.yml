name: Build Flutter Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          
      - run: flutter pub get

      - name: Build APK
        env:
          # تعطيل الـ Daemon لتقليل استهلاك الذاكرة
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-Xmx4096m"
        run: |
          # السطر ده هو السر: تخطي فحص النسخ وبناء الـ APK فوراً
          flutter build apk --debug --no-pub --android-skip-build-dependency-validation

      - name: Locate and Upload
        uses: actions/upload-artifact@v4
        with:
          name: aksab-debug-apk
          path: build/app/outputs/flutter-apk/*.apk
