name: Build Flutter Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          
      - run: flutter pub get

      # بناء الـ APK باستخدام فلاتر مع زيادة الذاكرة لتجنب الانهيار في آخر خطوة
      - name: Build APK with Flutter
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m"
        run: |
          flutter build apk --debug --verbose

      - name: Locate APK
        if: always()
        run: find build -name "*.apk"

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aksab-debug-apk
          path: "build/app/outputs/flutter-apk/*.apk"
          if-no-files-found: warn
