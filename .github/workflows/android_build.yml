name: Flutter Build (Final Strike)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle' # تفعيل كاش جرايدل لتسريع البناء

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true # تفعيل كاش فلاتر

      - name: Get Dependencies
        run: flutter pub get

      - name: Build Release APK
        # شلنا الـ verbose عشان اللوج ميبقاش ضخم ويسبب بطء، وخليناها عادية
        run: flutter build apk --release --no-tree-shake-icons

      - name: Find and Collect APK
        if: always() # يشتغل حتى لو الخطوة اللي قبله فشلت عشان نشوف الملفات
        run: |
          mkdir -p output
          echo "Listing all generated APKs..."
          find build/app/outputs/ -name "*.apk" -print
          find build/app/outputs/ -name "*.apk" -exec cp {} ./output/aksab_erp_final.apk \;
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aksab-ERP-Final-Test
          path: output/*.apk
