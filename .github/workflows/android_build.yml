name: Flutter Build (Fast Track & Deep Discovery)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      # بناء الـ APK مع تفعيل الـ Verbose لرؤية المسارات الحقيقية للملفات الناتجة
      - name: Build Release APK
        run: flutter build apk --release --no-tree-shake-icons --verbose

      # خطوة البحث الذكي: بتبحث في كل مجلد build/app/outputs عن أي ملف APK
      - name: Find and Collect APK
        run: |
          mkdir -p output
          echo "Searching for APK files..."
          # البحث بعمق في كل المجلدات المحتملة (flutter-apk أو apk/release)
          find build/app/outputs/ -name "*.apk" -exec cp {} ./output/aksab_erp_final.apk \;
          
          echo "Check if APK was collected:"
          if [ -f ./output/aksab_erp_final.apk ]; then
            echo "✅ Success: APK found and copied."
            ls -lh output/
          else
            echo "❌ Error: APK not found in the expected build paths."
            echo "Listing full build directory for debugging:"
            ls -R build/app/outputs/
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Aksab-ERP-Final-Test
          path: output/aksab_erp_final.apk
          if-no-files-found: error
