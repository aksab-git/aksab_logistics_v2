name: Flutter Build (Debug APK)

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      # بناء الـ APK مع السماح بالفشل في الخطوة دي لو الملف طلع في مسار غريب
      - name: Build Debug APK
        run: flutter build apk --debug || true

      # خطوة البحث "الصياد" - بتجيب أي APK طلع في أي داهية وتنقله لمكان واحد
      - name: Find and Collect APK
        run: |
          mkdir -p output
          find . -name "*.apk" -exec cp {} ./output/ \;
          ls -R output

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Aksab-Logistics-Found-APK
          path: output/*.apk
          if-no-files-found: error
