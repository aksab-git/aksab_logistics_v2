name: aksab_logistics_v2
description: "A standalone Flutter project for Aksab Logistics powered by Django."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- تم إزالة مكتبات Firebase تماماً ---

  # UI & Design Tools
  sizer: ^3.1.3
  font_awesome_flutter: ^10.7.0
  intl: ^0.20.2
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  lucide_icons: ^0.257.0

  # Location & Maps (مهمة جداً للرادار)
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.2

  # Utilities & State (حلقة الوصل مع Django)
  provider: ^6.1.2
  shared_preferences: ^2.5.3
  permission_handler: ^12.0.1
  share_plus: ^10.1.4
  path_provider: ^2.1.3
  http: ^1.6.0
  fl_chart: ^1.1.1
  pdf: ^3.11.3
  printing: ^5.14.2
  flutter_launcher_icons: ^0.14.4
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^21.0.0
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/
    # الحفاظ على ملف الخرائط كما طلبت
    - assets/OSMB-bc319d822a17aa9ad1089fc05e7d4e752460f877.geojson

